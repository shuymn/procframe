syntax = "proto2";

package procframe.options.v1;

option go_package = "github.com/shuymn/procframe/gen/procframe/options/v1;procframeoptionsv1";

import "google/protobuf/descriptor.proto";

message CliPath {
  repeated string segments = 1;
}

message ConfigFieldOptions {
  optional string env = 1;
  optional string default_string = 2;
  optional bool required = 3 [default = false];
  optional bool secret = 4 [default = false];
  optional bool bootstrap = 5 [default = false];
}

message CliGroupOptions {
  optional CliPath path = 1;
  optional string bind_into = 2;
  optional string summary = 3;
  optional bool hidden = 4 [default = false];
}

message CliOptions {
  optional bool enabled = 1 [default = true];
}

message WsOptions {
  optional bool enabled = 1 [default = false];
}

message ConnectOptions {
  optional bool enabled = 1 [default = false];
}

message ProcOptions {
  optional CliPath cli_path = 1;
  optional CliOptions cli = 2;
  optional WsOptions ws = 3;
  optional string summary = 4;
  optional bool hidden = 5 [default = false];
  optional ConnectOptions connect = 6;
}

message FieldOptions {
  optional string description = 1;
}

extend google.protobuf.FieldOptions {
  optional ConfigFieldOptions config = 51001;
  optional FieldOptions field = 51002;
}

extend google.protobuf.ServiceOptions {
  optional CliGroupOptions cli_group = 52001;
}

extend google.protobuf.MethodOptions {
  optional ProcOptions proc = 52002;
}
