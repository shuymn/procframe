syntax = "proto3";

package ticker.v1;

import "procframe/options/v1/options.proto";

option go_package = "github.com/shuymn/procframe/examples/gen/ticker/v1;tickerv1";

message TickRequest {
  string prefix = 1;
  int32 count = 2;
}

message TickResponse {
  string message = 1;
  int32 seq = 2;
}

service TickerService {
  option (procframe.options.v1.cli_group) = {
    path: {
      segments: ["ticker"]
    }
    summary: "Ticker operations"
  };

  rpc Tick(TickRequest) returns (stream TickResponse) {
    option (procframe.options.v1.proc) = {
      cli_path: {
        segments: ["run"]
      }
      summary: "Send ticks"
    };
  }
}
