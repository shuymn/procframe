syntax = "proto3";

package echo.v1;

import "procframe/options/v1/options.proto";

option go_package = "github.com/shuymn/procframe/examples/gen/echo/v1;echov1";

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}

service EchoService {
  option (procframe.options.v1.cli_group) = {
    path: {
      segments: ["echo"]
    }
    summary: "Echo operations"
  };

  rpc Echo(EchoRequest) returns (EchoResponse) {
    option (procframe.options.v1.proc) = {
      cli_path: {
        segments: ["run"]
      }
      summary: "Echo a message"
    };
  }
}
