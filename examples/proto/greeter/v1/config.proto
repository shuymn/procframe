syntax = "proto3";

package greeter.v1;

import "procframe/options/v1/options.proto";

option go_package = "github.com/shuymn/procframe/examples/gen/greeter/v1;greeterv1";

message GreeterConfig {
  string prefix = 1 [
    (procframe.options.v1.config).default_string = "Hello",
    (procframe.options.v1.config).env = "GREETER_PREFIX",
    (procframe.options.v1.config).bootstrap = true
  ];

  string suffix = 2 [
    (procframe.options.v1.config).default_string = "!",
    (procframe.options.v1.config).env = "GREETER_SUFFIX"
  ];
}
