syntax = "proto3";

package greeter.v1;

import "procframe/options/v1/options.proto";

option go_package = "github.com/shuymn/procframe/examples/gen/greeter/v1;greeterv1";

message GreetRequest {
  string name = 1;
}

message GreetResponse {
  string greeting = 1;
}

service GreeterService {
  option (procframe.options.v1.cli_group) = {
    path: {
      segments: ["greet"]
    }
    summary: "Greeter operations"
  };

  rpc Greet(GreetRequest) returns (GreetResponse) {
    option (procframe.options.v1.proc) = {
      cli_path: {
        segments: ["run"]
      }
      summary: "Greet someone"
    };
  }
}
