syntax = "proto3";

package test.otel.v1;

option go_package = "github.com/shuymn/procframe/internal/gen/test/otel/v1;otelv1";

// AnyValue represents any type of attribute value.
message AnyValue {
  oneof value {
    string string_value = 1;
    bool bool_value = 2;
    int64 int_value = 3;
    double double_value = 4;
    ArrayValue array_value = 5;
    KeyValueList kvlist_value = 6;
    bytes bytes_value = 7;
  }
}

// ArrayValue is a list of AnyValue messages.
message ArrayValue {
  repeated AnyValue values = 1;
}

// KeyValueList is a list of KeyValue messages.
message KeyValueList {
  repeated KeyValue values = 1;
}

// KeyValue represents a key-value pair for Span attributes, Link attributes, etc.
message KeyValue {
  string key = 1;
  AnyValue value = 2;
}

// InstrumentationScope represents the instrumentation scope information.
message InstrumentationScope {
  string name = 1;
  string version = 2;
  repeated KeyValue attributes = 3;
  uint32 dropped_attributes_count = 4;
}
