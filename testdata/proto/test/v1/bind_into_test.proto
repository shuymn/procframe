syntax = "proto3";

package test.v1;

import "procframe/options/v1/options.proto";

option go_package = "github.com/shuymn/procframe/internal/gen/test/v1;testv1";

message RepoScope {
  string org = 1 [(procframe.options.v1.field).description = "Organization name"];
}

enum PRState {
  PR_STATE_UNSPECIFIED = 0;
  PR_STATE_OPEN = 1;
  PR_STATE_CLOSED = 2;
}

message PRLabel {
  string name = 1;
}

message PRScope {
  PRState state = 1 [(procframe.options.v1.field).description = "Filter by PR state"];
  // The following fields exercise complex bind_into field types.
  // repeated string → multi-value flag, message → JSON string flag.
  repeated string labels = 2;
  PRLabel primary_label = 3;
}

message PRListRequest {
  RepoScope repo = 1;
  PRScope pr = 2;
  int32 limit = 3 [(procframe.options.v1.field).description = "Maximum number of results"];
}

message PRListResponse {
  repeated string items = 1;
}

// PRService demonstrates nested groups with bind_into.
service PRService {
  option (procframe.options.v1.cli_group) = {
    path: {
      segments: [
        "repo",
        "pr"
      ]
    }
    bind_into: "pr"
    summary: "Pull request operations"
  };

  rpc List(PRListRequest) returns (PRListResponse) {
    option (procframe.options.v1.proc) = {
      cli_path: {
        segments: ["list"]
      }
      summary: "List pull requests"
    };
  }
}
