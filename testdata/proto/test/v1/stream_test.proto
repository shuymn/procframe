syntax = "proto3";

package test.v1;

import "procframe/options/v1/options.proto";

option go_package = "github.com/shuymn/procframe/internal/gen/test/v1;testv1";

// TickRequest is the request for the Watch RPC.
message TickRequest {
  string label = 1 [(procframe.options.v1.field).description = "Label for tick events"];
  int32 count = 2 [(procframe.options.v1.field).description = "Number of ticks to emit"];
}

// TickResponse is the response for the Watch RPC.
message TickResponse {
  string label = 1;
  int32 seq = 2;
}

// TickService demonstrates server-streaming.
service TickService {
  option (procframe.options.v1.cli_group) = {
    path: {
      segments: ["tick"]
    }
    summary: "Tick operations"
  };

  rpc Watch(TickRequest) returns (stream TickResponse) {
    option (procframe.options.v1.proc) = {
      cli_path: {
        segments: ["watch"]
      }
      summary: "Watch ticks"
    };
  }
}
