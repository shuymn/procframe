syntax = "proto3";

package test.v1;

option go_package = "github.com/shuymn/procframe/gen/test/v1;testv1";

import "procframe/options/v1/options.proto";

// TickRequest is the request for the Watch RPC.
message TickRequest {
  string label = 1;
  int32 count = 2;
}

// TickResponse is the response for the Watch RPC.
message TickResponse {
  string label = 1;
  int32 seq = 2;
}

// TickService demonstrates server-streaming.
service TickService {
  option (procframe.options.v1.cli_group) = {
    path: {segments: ["tick"]}
    summary: "Tick operations"
  };

  rpc Watch(TickRequest) returns (stream TickResponse) {
    option (procframe.options.v1.proc) = {
      cli_path: {segments: ["watch"]}
      summary: "Watch ticks"
    };
  }
}
